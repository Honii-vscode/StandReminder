<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#121212">
  <title>Stand Reminder</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNTEyIiBoZWlnaHQ9IjUxMiIgdmVyc2lvbj0iMS4xIgB2aWV3Qm94PSIwIDAgNTEyIDUxMiIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj4KICA8cmVjdCB3aWR0aD0iNTEyIiBoZWlnaHQ9IjUxMiIgcng9IjY0IiBmaWxsPSIjMWQxZDFkIi8+CiAgPHRleHQgeD0iMjU2IiB5PSIzMjAiIGZvbnQtZmFtaWx5PSJBcmlhbCIgZm9udC1zaXplPSIxOTAiIGZpbGw9IndaWQiPopjIiB0ZXh0LWFuY2hvcj0ibWlkZGxlIj5TdDwvdGV4dD4KPC9zdmc+">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #121212;
      --bg-card: #1e1e1e;
      --bg-elevated: #2c2c2c;
      --text-primary: #ffffff;
      --text-secondary: rgba(255, 255, 255, 0.7);
      --text-tertiary: rgba(255, 255, 255, 0.5);
      --accent: #4dabf7;
      --accent-stand: #69db7c;
      --accent-break: #ffd43b;
      --border-radius: 16px;
      --border-radius-lg: 24px;
      --shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
    }

    html, body {
      height: 100%;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, "Helvetica Neue", sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .app {
      min-height: 100vh;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      padding-bottom: calc(20px + env(safe-area-inset-bottom));
      padding-top: calc(20px + env(safe-area-inset-top));
    }

    .card {
      background: var(--bg-card);
      border-radius: var(--border-radius-lg);
      box-shadow: var(--shadow);
      padding: 28px 24px;
      width: 100%;
      max-width: 400px;
    }

    h1 {
      font-size: 28px;
      font-weight: 600;
      text-align: center;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .subtitle {
      text-align: center;
      color: var(--text-secondary);
      font-size: 15px;
      margin-bottom: 32px;
    }

    .progress-container {
      display: flex;
      justify-content: center;
      position: relative;
      margin-bottom: 28px;
    }

    .progress-ring {
      transform: rotate(-90deg);
      width: 220px;
      height: 220px;
    }

    .progress-ring-circle {
      transition: stroke-dashoffset 0.35s;
      fill: transparent;
      stroke-width: 8;
    }

    .progress-bg {
      stroke: var(--bg-elevated);
    }

    .progress-bar {
      stroke: var(--accent);
      stroke-linecap: round;
    }

    .progress-bar.working {
      stroke: var(--accent);
    }

    .progress-bar.break,
    .progress-bar.breaking {
      stroke: var(--accent-break);
    }

    .time-display {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }

    .time-value {
      font-size: 48px;
      font-weight: 700;
      line-height: 1;
      letter-spacing: -1px;
    }

    .time-label {
      font-size: 14px;
      color: var(--text-secondary);
      margin-top: 6px;
    }

    .current-mode {
      text-align: center;
      font-size: 18px;
      font-weight: 500;
      margin-bottom: 16px;
      min-height: 27px;
    }

    .current-interval {
      text-align: center;
      color: var(--text-tertiary);
      font-size: 14px;
      margin-bottom: 24px;
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 24px;
    }

    .btn {
      width: 100%;
      padding: 16px 24px;
      border: none;
      border-radius: 12px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
    }

    .btn-primary {
      background: var(--accent);
      color: #000000;
    }

    .btn-primary:active {
      transform: scale(0.98);
      opacity: 0.9;
    }

    .btn-secondary {
      background: var(--bg-elevated);
      color: var(--text-primary);
    }

    .btn-danger {
      background: #e53e3e;
      color: white;
    }

    .btn-secondary:active {
      transform: scale(0.98);
      opacity: 0.9;
    }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .hidden {
      display: none !important;
    }

    .stats-card {
      background: var(--bg-elevated);
      border-radius: 12px;
      padding: 16px;
      margin-top: 16px;
    }

    .stats-title {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 12px;
      font-weight: 500;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .stat-item {
      text-align: center;
      padding: 8px;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 700;
    }

    .stat-label {
      font-size: 12px;
      color: var(--text-tertiary);
      margin-top: 4px;
    }

    .mode-indicator {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 500;
    }

    .mode-working {
      background: rgba(77, 171, 247, 0.2);
      color: var(--accent);
    }

    .mode-breaking {
      background: rgba(255, 212, 59, 0.2);
      color: var(--accent-break);
    }

    .mode-standing {
      background: rgba(105, 219, 124, 0.2);
      color: var(--accent-stand);
    }

    .initial-state {
      text-align: center;
      padding: 20px 0;
    }

    .initial-desc {
      color: var(--text-secondary);
      font-size: 15px;
      line-height: 1.5;
      margin-bottom: 32px;
    }

    .initial-desc span {
      display: block;
      margin-top: 8px;
      font-size: 13px;
      color: var(--text-tertiary);
    }

    .vibrate-test {
      font-size: 13px;
      color: var(--text-tertiary);
      text-align: center;
      margin-top: 16px;
    }

    .debug-panel {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: 12px;
      z-index: 9999;
      background: rgba(10, 10, 10, 0.92);
      color: #e8f0ff;
      border: 1px solid rgba(77, 171, 247, 0.45);
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.45);
      padding: 10px 12px;
      font-size: 12px;
      line-height: 1.4;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      max-height: 40vh;
      overflow: auto;
    }

    .debug-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      gap: 8px;
    }

    .debug-title {
      font-weight: 700;
      color: #9dd2ff;
    }

    .debug-btn {
      border: 0;
      border-radius: 8px;
      padding: 4px 8px;
      font-size: 12px;
      background: #2d6ea8;
      color: #fff;
      cursor: pointer;
    }

    .debug-text {
      white-space: pre-wrap;
      word-break: break-word;
      color: #d8e6ff;
    }

    @media (max-height: 500px) {
      .card {
        padding: 20px 16px;
      }
      .progress-ring {
        width: 180px;
        height: 180px;
      }
      .time-value {
        font-size: 40px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="card">
      <h1 id="titleText">Stand Reminder</h1>
      <p class="subtitle">随机间隔提醒你站立活动</p>

      <!-- 初始状态 -->
      <div id="initialState" class="initial-state">
        <p class="initial-desc">
          工作时间：20-30分钟随机<br>
          活动时间：3-5分钟随机<br>
          <span>每个周期结束后自动开始下一周期</span>
        </p>
        <button class="btn btn-primary" id="btnStart">开始提醒</button>
        <div class="vibrate-test">点击后会请求通知权限，确保提醒能正常送达</div>
      </div>

      <!-- 计时状态 -->
      <div id="timerState" class="hidden">
        <div class="current-mode">
          <span id="modeIndicator" class="mode-indicator"></span>
        </div>
        <div id="current-interval" class="current-interval"></div>

        <div class="progress-container">
          <svg class="progress-ring">
            <circle class="progress-ring-circle progress-bg" r="90" cx="110" cy="110"></circle>
            <circle id="progressBar" class="progress-ring-circle progress-bar" r="90" cx="110" cy="110"></circle>
          </svg>
          <div class="time-display">
            <div id="timeDisplay" class="time-value">--:--</div>
            <div id="modeName" class="time-label"></div>
          </div>
        </div>

        <div class="controls">
          <button class="btn btn-secondary" id="btnPauseResume"></button>
          <button class="btn btn-danger" id="btnStop">结束提醒</button>
        </div>
      </div>

      <div id="statsCard" class="stats-card">
        <div class="stats-title">今日统计</div>
        <div class="stats-grid">
          <div class="stat-item">
            <div id="cycles" class="stat-value">0</div>
            <div class="stat-label">已完成周期</div>
          </div>
          <div class="stat-item">
            <div id="totalWorking" class="stat-value">0</div>
            <div class="stat-label">工作分钟</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="debugPanel" class="debug-panel hidden">
    <div class="debug-head">
      <span class="debug-title">Debug Panel</span>
      <button id="btnHideDebug" class="debug-btn">隐藏调试</button>
    </div>
    <div id="debugText" class="debug-text"></div>
  </div>

  <script>
    // 参数配置 - 调试模式
    const CONFIG = {
      workMin: 1,
      workMax: 1,
      breakMin: 1,
      breakMax: 1
    };

    // 状态
    let state = {
      isRunning: false,
      isPaused: false,
      mode: 'idle', // idle, working, breaking
      currentDuration: 0,
      remaining: 0,
      elapsed: 0,
      lastTickTime: 0,
      intervalId: null,
      wakeLock: null,

      // 统计
      cyclesCompleted: 0,
      totalWorkingMinutes: 0,
      todayDate: new Date().toDateString()
    };

    const DEBUG_ENABLED = new URLSearchParams(window.location.search).get('debug') === '1'
      || localStorage.getItem('standReminderDebug') === '1';
    const debugState = {
      lastElapsedSeconds: 0,
      lastElapsedMs: 0,
      lastElapsedSource: '-',
      lastApplyAt: 0
    };

    // DOM
    const circumference = 2 * Math.PI * 90;
    const progressBarEl = document.getElementById('progressBar');
    progressBarEl.style.strokeDasharray = `${circumference} ${circumference}`;
    progressBarEl.style.strokeDashoffset = '0';

    function setProgress(percent) {
      const safePercent = Math.min(100, Math.max(0, Number(percent) || 0));
      const offset = circumference - safePercent / 100 * circumference;
      progressBarEl.style.strokeDashoffset = offset;
    }

    function updateDebugPanel() {
      if (!DEBUG_ENABLED) return;

      const el = document.getElementById('debugText');
      if (!el) return;

      const lines = [
        `mode=${state.mode} running=${state.isRunning} paused=${state.isPaused}`,
        `remaining=${state.remaining}s currentDuration=${state.currentDuration}s`,
        `lastTickTime=${state.lastTickTime ? new Date(state.lastTickTime).toLocaleTimeString() : '-'}`,
        `lastElapsed=${debugState.lastElapsedSeconds}s (${debugState.lastElapsedMs}ms) from=${debugState.lastElapsedSource}`,
        `lastApplyAt=${debugState.lastApplyAt ? new Date(debugState.lastApplyAt).toLocaleTimeString() : '-'}`,
        `visibility=${document.visibilityState} wakeLock=${!!state.wakeLock}`
      ];
      el.textContent = lines.join('\n');
    }

    function formatTime(seconds) {
      const mins = Math.floor(seconds / 60);
      const secs = seconds % 60;
      return `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
    }

    function getRandomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function randomWorkDuration() {
      return getRandomInt(CONFIG.workMin, CONFIG.workMax) * 60;
    }

    function randomBreakDuration() {
      return getRandomInt(CONFIG.breakMin, CONFIG.breakMax) * 60;
    }

    function vibrate(pattern) {
      if ('vibrate' in navigator) {
        navigator.vibrate(pattern);
      }
    }

    // 鎾斁鎻愰啋闊?
    function playAlarm(type) {
      if (!window.AudioContext && !window.webkitAudioContext) {
        return;
      }

      try {
        // 使用AudioContext生成简单铃声
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        let closeAt = 0.8;

        if (type === 'work') {
          // 工作结束 提醒站起来 - 三连音
          const now = ctx.currentTime;
          const o1 = ctx.createOscillator();
          const o2 = ctx.createOscillator();
          const o3 = ctx.createOscillator();
          o1.connect(ctx.destination);
          o2.connect(ctx.destination);
          o3.connect(ctx.destination);
          o1.frequency.value = 880;
          o2.frequency.value = 880;
          o3.frequency.value = 880;
          o1.start(now);
          o1.stop(now + 0.22);
          o2.start(now + 0.36);
          o2.stop(now + 0.58);
          o3.start(now + 0.72);
          o3.stop(now + 0.94);
          closeAt = 1.1;
        } else {
          // 活动结束 提醒坐下 - 双连音，音调稍低
          const now = ctx.currentTime;
          const o1 = ctx.createOscillator();
          const o2 = ctx.createOscillator();
          o1.connect(ctx.destination);
          o2.connect(ctx.destination);
          o1.frequency.value = 660;
          o2.frequency.value = 660;
          o1.start(now);
          o1.stop(now + 0.28);
          o2.start(now + 0.42);
          o2.stop(now + 0.7);
          closeAt = 0.9;
        }

        // Release audio resources after tones are finished.
        setTimeout(() => {
          ctx.close().catch(() => {});
        }, Math.ceil(closeAt * 1000));
      } catch (e) {
        console.warn('playAlarm failed:', e);
      }
    }

    async function requestNotificationPermission() {
      if ('Notification' in window) {
        try {
          await Notification.requestPermission();
        } catch (e) {
          console.warn('Notification permission request failed:', e);
        }
      }
    }

    async function sendNotification(title, body, vibratePattern = []) {
      if (!('Notification' in window) || Notification.permission !== 'granted') {
        return;
      }

      const options = {
        body,
        icon: 'data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNTEyIiBoZWlnaHQ9IjUxMiIgdmVyc2lvbj0iMS4xIgB2aWV3Qm94PSIwIDAgNTEyIDUxMiIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj4KICA8cmVjdCB3aWR0aD0iNTEyIiBoZWlnaHQ9IjUxMiIgcng9IjY0IiBmaWxsPSIjMWQxZDFkIi8+CiAgPHRleHQgeD0iMjU2IiB5PSIzMjAiIGZvbnQtZmFtaWx5PSJBcmlhbCIgZm9udC1zaXplPSIxOTAiIGZpbGw9IndaWQiPopjIiB0ZXh0LWFuY2hvcj0ibWlkZGxlIj5TdDwvdGV4dD4KPC9zdmc+'
      };
      if (Array.isArray(vibratePattern) && vibratePattern.length > 0) {
        options.vibrate = vibratePattern;
      }

      try {
        if ('serviceWorker' in navigator) {
          const reg = await navigator.serviceWorker.getRegistration();
          if (reg) {
            await reg.showNotification(title, options);
            return;
          }
        }
        new Notification(title, options);
      } catch (e) {
        console.warn('Notification send failed:', e);
      }
    }

    async function requestWakeLock() {
      if ('wakeLock' in navigator) {
        try {
          state.wakeLock = await navigator.wakeLock.request('screen');
        } catch (e) {
          console.log('Wake Lock not available:', e);
        }
      }
    }

    async function releaseWakeLock() {
      if (state.wakeLock) {
        try {
          await state.wakeLock.release();
          state.wakeLock = null;
        } catch (e) {
          console.log('Error releasing wake lock:', e);
        }
      }
    }

    function startWorking() {
      console.log('startWorking');
      state.isPaused = false;
      state.mode = 'working';
      state.currentDuration = randomWorkDuration();
      state.remaining = state.currentDuration;
      state.elapsed = 0;
      state.lastTickTime = Date.now();
      updateUI();
      startTick();
      document.getElementById('initialState').classList.add('hidden');
      document.getElementById('timerState').classList.remove('hidden');
      requestWakeLock();
    }

    function startBreak() {
      state.isPaused = false;
      state.mode = 'breaking';
      state.currentDuration = randomBreakDuration();
      state.remaining = state.currentDuration;
      state.elapsed = 0;
      state.lastTickTime = Date.now();
      updateUI();
    }

    function nextCycle() {
      if (state.mode === 'working') {
        // 工作结束，提醒站起来
        const workVibrate = [300, 140, 300, 140, 300];
        vibrate(workVibrate);
        playAlarm('work');
        void sendNotification('该站起来了！', '活动活动，' + Math.round(state.currentDuration / 60) + '分钟后提醒你坐下', workVibrate);
        state.totalWorkingMinutes += Math.round(state.currentDuration / 60);
        state.cyclesCompleted++;
        saveStats();
        startBreak();
      } else {
        // 活动结束，回去工作
        const breakVibrate = [260, 140, 260];
        vibrate(breakVibrate);
        playAlarm('break');
        void sendNotification('可以坐下了', '开始新一周期工作', breakVibrate);
        startWorking();
      }
    }

    function applyElapsedTime(now = Date.now(), source = 'tick') {
      const elapsedMs = now - state.lastTickTime;
      const elapsedSeconds = Math.floor(elapsedMs / 1000);

      if (elapsedSeconds <= 0) {
        debugState.lastElapsedSeconds = 0;
        debugState.lastElapsedMs = elapsedMs;
        debugState.lastElapsedSource = source;
        debugState.lastApplyAt = now;
        return false;
      }

      state.remaining -= elapsedSeconds;
      // Keep sub-second remainder so long runs are more accurate.
      state.lastTickTime += elapsedSeconds * 1000;
      debugState.lastElapsedSeconds = elapsedSeconds;
      debugState.lastElapsedMs = elapsedMs;
      debugState.lastElapsedSource = source;
      debugState.lastApplyAt = now;
      return true;
    }

    function tick() {
      if (state.isPaused) return;

      const changed = applyElapsedTime(Date.now(), 'tick');
      if (!changed) return;

      if (state.remaining <= 0) {
        nextCycle();
        return;
      }

      updateUI();
    }

    // 当从后台返回时校准时间
    function recalibrateTime() {
      if (!state.isRunning || state.isPaused || state.mode === 'idle') return;

      const changed = applyElapsedTime(Date.now(), 'recalibrate');
      if (!changed) return;

      if (state.remaining <= 0) {
        console.log('[Recalibrate] Time is up!');
        nextCycle();
      } else {
        updateUI();
      }
    }

    // 记录每次可见性变化时间
    function handleVisibilityChange() {
      debugState.lastElapsedSource = `visibility:${document.visibilityState}`;
      debugState.lastApplyAt = Date.now();
      if (document.visibilityState === 'visible') {
        // 回到前台，校准时间
        if (state.isRunning && !state.isPaused) {
          requestWakeLock();
          recalibrateTime();
        }
      } else {
        releaseWakeLock();
      }
      updateDebugPanel();
    }

    function startTick() {
      if (state.intervalId) {
        clearInterval(state.intervalId);
      }
      state.isRunning = true;
      state.intervalId = setInterval(tick, 1000);
    }

    function updateUI() {
      // 更新UI
      const modeText = {
        working: '工作中',
        breaking: '活动中'
      };

      const modeIndicator = document.getElementById('modeIndicator');
      const currentInterval = document.getElementById('current-interval');
      const timeDisplay = document.getElementById('timeDisplay');
      const modeName = document.getElementById('modeName');

      modeIndicator.textContent = state.mode === 'working' ? '工作阶段' : '活动阶段';
      modeIndicator.className = 'mode-indicator ' + (state.mode === 'working' ? 'mode-working' : 'mode-breaking');
      currentInterval.textContent = `本轮${state.mode === 'working' ? '工作' : '活动'}时长 ${Math.round(state.currentDuration / 60)} 分钟`;
      timeDisplay.textContent = formatTime(state.remaining);
      modeName.textContent = modeText[state.mode];

      const percent = state.currentDuration > 0
        ? (state.remaining / state.currentDuration) * 100
        : 0;
      setProgress(percent);

      // 更新进度环颜色
      progressBarEl.classList.remove('working', 'break', 'breaking');
      progressBarEl.classList.add(state.mode);

      // 更新按钮文字
      const btnPR = document.getElementById('btnPauseResume');
      btnPR.textContent = state.isPaused ? '继续' : '暂停';

      // 更新统计
      updateStats();
      updateDebugPanel();
    }

    function updateStats() {
      document.getElementById('cycles').textContent = state.cyclesCompleted;
      document.getElementById('totalWorking').textContent = state.totalWorkingMinutes;
    }

    function togglePause() {
      state.isPaused = !state.isPaused;
      if (state.isPaused) {
        releaseWakeLock();
      } else {
        state.lastTickTime = Date.now();
        requestWakeLock();
      }
      updateUI();
    }

    function stopAll() {
      state.isRunning = false;
      state.isPaused = false;
      state.mode = 'idle';
      state.currentDuration = 0;
      state.remaining = 0;
      if (state.intervalId) {
        clearInterval(state.intervalId);
        state.intervalId = null;
      }
      releaseWakeLock();
      setProgress(100);
      document.getElementById('initialState').classList.remove('hidden');
      document.getElementById('timerState').classList.add('hidden');
      updateDebugPanel();
    }

    function saveStats() {
      // 检查是否是新的一天
      const today = new Date().toDateString();
      if (today !== state.todayDate) {
        // 重置统计
        state.cyclesCompleted = 0;
        state.totalWorkingMinutes = 0;
        state.todayDate = today;
      }
      localStorage.setItem('standReminderStats', JSON.stringify({
        cyclesCompleted: state.cyclesCompleted,
        totalWorkingMinutes: state.totalWorkingMinutes,
        todayDate: state.todayDate
      }));
    }

    function loadStats() {
      const saved = localStorage.getItem('standReminderStats');
      if (saved) {
        try {
          const data = JSON.parse(saved);
          const today = new Date().toDateString();
          if (data.todayDate === today) {
            state.cyclesCompleted = data.cyclesCompleted || 0;
            state.totalWorkingMinutes = data.totalWorkingMinutes || 0;
            state.todayDate = data.todayDate;
          }
        } catch (e) {
          console.error('Error loading stats:', e);
        }
      }
    }

    // 事件绑定
    document.getElementById('btnStart').addEventListener('click', async () => {
      console.log('btnStart clicked');
      // 网页端请求通知权限
      await requestNotificationPermission();
      // 原生 Android 请求通知权限
      await requestNativePermissions();
      startWorking();
    });

    document.getElementById('btnPauseResume').addEventListener('click', togglePause);
    document.getElementById('btnStop').addEventListener('click', stopAll);

    if (DEBUG_ENABLED) {
      localStorage.setItem('standReminderDebug', '1');
      const panel = document.getElementById('debugPanel');
      panel.classList.remove('hidden');
      document.getElementById('btnHideDebug').addEventListener('click', () => {
        localStorage.removeItem('standReminderDebug');
        panel.classList.add('hidden');
      });
      updateDebugPanel();
    }

    // 页面可见性变化处理（防止系统暂停JS）
    document.addEventListener('visibilitychange', handleVisibilityChange);

    // 注册Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/sw.js').catch((e) => {
          console.warn('Service worker registration failed:', e);
        });
      });
    }

    // 原生权限请求 - 请求Android通知权限
    async function requestNativePermissions() {
      // 如果在Capacitor Android环境中，请求运行时权限
      if (typeof Capacitor !== 'undefined' && Capacitor.isNativePlatform()) {
        try {
          // Capacitor 原生环境中，LocalNotifications 插件已经可用
          const { LocalNotifications } = Capacitor.Plugins;
          if (!LocalNotifications) {
            console.warn('LocalNotifications plugin not found');
            return;
          }
          // Android 13+ 需要请求通知权限
          // 使用 LocalNotifications 插件正确请求权限
          const result = await LocalNotifications.requestPermissions();
          console.log('Native notification permission requested:', result);
        } catch (e) {
          console.warn('Failed to request native notification permission:', e);
        }
      }
    }

    // 初始加载
    loadStats();
    updateStats();
    setProgress(100);
    // APP鍚姩鏃惰姹傝嚜鍔ㄥ悗鍙版秷鎭潈闄�
    requestNativePermissions();

    console.log('Stand Reminder initialized');
  </script>
</body>
</html>
